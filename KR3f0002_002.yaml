body:
  text: 新儀象法要卷中宋蘇頌撰渾象渾象六合儀渾象地匱渾象赤道牙渾象紫微垣星圖渾象東北方中外官星圖渾象西南方中外官星圖渾象北極星圖渾象南極星圖四時昏曉加臨中星圖春分昏中星圖春分曉中星圖夏至昏中星圖夏至曉中星圖秋分昏中星圖秋分曉中星圖冬至昏中星圖冬至曉中星圖右渾象一座太史舊無今倣隋制增損製之上列二十八宿周天度及紫微垣中外官星以俯視七政之運轉納於六合儀天經地渾內周以一木匱載之其中貫以樞軸軸南北出渾象外南長北短地渾在木匱面橫置之以象地天經與地渾相結縱置之半在地上半隱地下以象天其樞軸北貫天經上杠中末與杠平出匱外三十五度少弱以象北極出地南亦貫天經出下杠外入匱內三十五度少弱以象南極入地就赤道為牙距四百七十八牙以銜天輪隨機輪之地轂以運動按隋志云渾天象者其制有機而無衡梁末祕府有以木為之其圓如丸其大數圍南北兩頭有軸遍體布二十八宿三家星黃赤二道及天漢等别為橫規以抱其外高下半之此謂抱規抱渾象高下謂之半以象地南軸頭入地注于南植植柱也以象南極北軸頭出于地上注于北植以象北極正東西運轉昏明中星既其應度分至氣節亦驗在不差而已今所製大率倣此並約梁令瓉張思訓法别為日月五星循繞三百六十五度隨天運轉又王蕃云渾象之法地當在天內其勢不便故反觀其形地為外郭而已解者無異在內詭狀殊體而合于理可謂竒巧也今地渾亦有渾象外蓋出于蕃法也一云以象南極入地别設天運輪一側置渾象南其轂貫南樞軸之末其軸為牙距六百以銜天軸軸下接天輪隨機輪之地轂以運動右渾象六合儀其制有天經雙規地渾單環雙規直徑五尺四寸七分厚八分縱置木匱小單環直徑五尺四寸七分闊三寸七分厚一寸五分橫置木匱面渾象納其中半隱地下半出地上以視南北極之髙下右渾象木地匱一以安渾象及天經地渾內置天輪與赤道牙相接隨天輪運轉右渾象赤道牙一渾象體正圓如毬徑四尺五寸六分半上布周天三百六十五度有畸中外官星其名二百四十六其數一千二百八十一紫微垣在渾象北上規星其名三十七其數一百八十三二項總名二百八十三星數一千四百六十四東西繞以黃赤二道二十八舍相距于四方日月五星所行中貫以樞軸南北置之赤道牙與天輪相銜候天輪動則與渾象俱轉其天度星舍等及黃赤道日月五星所行周旋渾象各有名數距度次序標道右紫微垣星圖一凡三十七名一百八十三星布列渾象之北上規所以正天地之南北也北斗七星在垣內所以正四時也史志曰中宫北極五星鈎陳六星皆在紫宫中北極北辰之最尊者也其細星天之樞也天運無窮三光迭曜而極星不移故曰居其所而衆星拱之舊説皆以紐星即天極在正北為天心不動今驗天極亦晝夜運轉其不移處乃在天極之內一度有半故渾象杠軸正中置之不動以象天心也自天極外諸星皆隨渾象運轉以象列宿隨天左旋也天有二十八宿為十二次舍布列四方三百六十五度有畸而天極亦具其數古人所謂天形如蓋即天心為蓋之杠軸列舍如蓋之橑輻分布十二次舍之度數紫宫近天極故狹而密列舍布四方故闊而疏也北斗七星所謂璇璣玉衡以齊七政者也魁四星為璿璣杓五星為玉衡杓攜龍角杓斗柄也龍角東方星攜連也衡中南斗衡斗中央之星也魁枕參首斗第一星為魁用昏建者杓斗第七星為杓斗之星也夜半建者衡假令杓昏建寅則夜半衡亦建寅平旦建者魁斗為帝車運于中央照臨四海分陰陽建四時均五行移節度定諸紀皆繫于斗故揚子雲云日一南而萬物死謂夏至已後日第南陸一反南道羣隂漸長萬物所以死也日一北而萬物生謂冬至已後日窮北陸一反北道羣陽漸長萬物所以生也斗一北而萬物虛謂立冬已後斗杓建亥自亥之後陰主于時萬物以斂故曰虛斗一南而萬物盈謂立夏已後斗杓建巳自巳之後陽主于時萬物華盛故曰盈日之南也右行而左還斗之北也左行而右還日則迎天右行謂春行西方厯七星而南秋行東方厯七星而北始行西方故云右行也還從東方故云左還也斗則隨天而行春指東方厯三辰而南秋指西方厯三辰而北始指東方故云左行也還從西方故云右還也由是言之天形無垠晝夜不息所以分節候運寒暑日與斗建相推移于上而成歲于下也所以著于圖象者欲俯仰之參合先天而趨務也故人君南面聽天下常視四七之中星察玉衡之杓建考日躔之南北順天時而布民政自唐虞以來莫不尚之然則渾象人居天外故俯視之星圖人在天裏故仰觀之二者相戾蓋俯仰之異也其下中外官星亦倣此右渾象中外官星圖二凡二百四十六名一千二百八十一星分布于四方周遍天體惟南極入地常隱不見紫微宫常見不隱餘星近日而伏逺日而出四時互見二十八宿為十二次三百六十五度有畸日月五星之所舍也史志曰東宫蒼龍謂角亢氐房心尾箕七宿其形如龍在東方故曰蒼龍也南宫朱鳥謂東井輿鬼栁七星張翼軫七宿其形如鶉鳥在南方故曰朱鳥也西宫咸池白虎謂奎婁胃昴畢觜觽參為白虎在西方故曰白虎也北方元武謂南斗牽牛女虛危營室東壁有龜蛇體在北方故曰元武也凡星皆隨天左旋日月五星常違天右轉昏曉于是乎正寒暑于是乎生嵗時于是乎成所以著于渾象者將以俯察而知七政行度之所在也著于圖者將以仰觀而上合乎天象也星有三色所以别三家之異也出于石申者赤也出于甘德者黑出于巫咸者黃紫宫諸星亦同出三家中外官與紫宫星總二百八十三名一千四百六十四星漢志所載紫宫及中外官星才百一十八名積數七百八十三星至晉武帝時太史令陳卓揔三家所著星圖方具上數至今不改然則施于渾象者惟天極北斗二十八舍為占候之要其餘備載者所以具上象之全體也右渾象北極南極星圖二古圖有圓縱二法圖圓視天極則親視南極則不及橫圖視列舍則親視兩極則疏何以言之夫天體正圓如兩蓋之相合南北兩極猶兩蓋之杠轂二十八宿猶蓋之弓撩周禮考工記蓋弓二十八以象星注云蓋弓撩也然則古之置蓋者亦取法于天赤道橫絡天腹如兩蓋之交處赤道之北為內郭如上覆蓋赤道之南為外郭如下仰蓋故列弓撩之數近兩轂則狹漸逺漸闊至交則極闊勢之然也亦猶列舍之度近兩極則狹漸逺漸闊至赤道則極闊也以圓圖視之則近北星頗合天形近南星度當漸狹則反闊矣以橫圖視之則去兩極星度皆闊失天形矣今倣天形為覆仰兩圓圖以蓋言之則星度並在蓋外皆以圖心為極自赤道而北為北極內官星圖赤道而南為南極外官星圖兩圖相合全體渾象則星官闊狹之勢吻與天合以之占候則不失毫釐矣右四時昏曉加臨中星圖聖人南面視四時之中所以候四時之早晚以布民政故堯命羲和厯象日月星辰敬授人時舜在璿璣玉衡以齊七政皆謂此也然則天以二十八宿分布四方凡三百六十五度有畸為日月五星之次舍日行一度為一日周天為一歲月行三十日一周天為一月故日月一歲十二會為四時時有孟仲季仲為分至人君不能日夕察候星度故舉四時之中以驗之曰日中春分也曰日永夏至也曰宵中秋分也曰日短冬至也所謂星鳥者南方之星七為朱鳥體春分則見于南方也所謂星火者東方之星七為蒼龍體夏至則見于南方也所謂星虛者北方之星七為元武體秋分則見于南方也所謂星昴者西方之星七為白虎體冬至則見于南方也鄭康成云凡記昏明中星者為人君南面而聽天下視時候以授民事也既舉四時之中又昏旦視四方列宿則孟季之月與周天之度數從可知也故厯代聖王尚之經史記云夏有小正周有時訓秦漢暨唐及本朝皆有月令所以順天時而督民務也詩曰定之方中作于楚宫又有三星在天在隅在户之候春秋傳曰啓蟄而郊龍見而雩又曰凡土功水昏正而栽又曰凡馬日中而出日中而入此皆視列宿而行國政也然其上所記及唐虞之世日行次舍如此厯三代漢唐至今數千年日行漸逺故中星隨而轉移今以禮記月令洎唐及本朝所測合為四時昏旦中星圖所以上備宸庭觀覽順陰陽而頒政令也四仲圖别出于後圖稱月令者是漢太初厯星度稱唐者是開元大衍厯星度稱今者是元豐所測見今星度也新儀象法要卷中
