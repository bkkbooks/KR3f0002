body:
  text: 新儀象法要卷上宋蘇頌撰渾儀六合儀三辰儀四遊儀天經雙環陰緯單環天常單環三辰儀雙環赤道單環黃道雙環四象單環天運單環四遊儀雙環望筒直距龍柱鰲雲水趺進儀象狀臣頌先準元祐元年冬十一月詔旨定奪新舊渾儀尋集日官及檢詳應前後論列干證文字赴翰林天文院太史局兩處對得新渾儀係至道皇祐中置造並堪行用舊渾儀係熙寧中所造環器怯薄水趺低墊難以行使奉聖旨下祕書省依所定施行臣竊以儀象之法度數備存而日官所以互有論訴者蓋以器未合古名亦不正至於測候須人運動人手有髙下故躔度亦隨而移轉是致兩競各指得失終無定論蓋古人測候天數其法有二一曰渾天儀規天矩地機隱于內上布經躔以日星行度察寒暑進退如張衡渾天開元水運銅渾是也二曰銅候儀今新舊渾儀翰林天文院與太史局所用者是也又案吳中常侍王蕃云渾天儀者羲和之舊器積代相傳謂之機衡其為用也以察三光以分宿度者也又有渾天象者以著天體以布星辰二者以考於天蓋密矣詳此則渾天儀銅渾儀之外又有渾天象凡三器也渾天象厯代罕傳其制惟隋書志稱梁代祕府有之云是宋元嘉中所造者由是而言古人候天具此三器乃能盡妙今惟一法誠恐未得親密然則張衡之制史失其傳開元舊器唐世已亡國朝太平興國初巴蜀人張思訓首創其式以獻太宗皇帝召工造於禁中踰年而成詔置文明殿今文德殿是也東鼓樓下題曰太平渾儀自思訓死機繩斷壞無復知其法制者臣昨訪問得吏部守當官韓公廉通九章算術常以鉤股法推考天度臣切思古人言天有周髀之術其説曰髀股也股者表也日行周徑里數各依算術用鉤股重差推晷影極遊以為逺近之數皆得表股周人受之故曰周髀若通此術則天數從可知也因説與張衡一行梁令瓚張思訓法式大綱問其可以尋究依仿製造否其人稱若據算術案器象亦可成就既而撰到九章鉤股測驗渾天書一卷并造到木樣機輪一坐臣觀其器範雖不盡如古人之説然激水運輪亦有巧思若令造作必有可取遂具奏陳乞先創木樣進呈差官試驗如候天有凖即别造銅器奉二年八月十六日詔如臣所請置局差官及專作材料等遂奏差鄭州原武縣主簿充夀州州學教授王沇之充專監造作兼管句收支官物太史局夏官正周日嚴秋官正于太古冬官正張仲宣等與韓公廉同充製度官局生袁惟幾苖景張端節級劉仲景學生侯永和于湯臣測驗晷景刻漏等都作人貟尹清部轄指畫工作至三年五月先造成小樣有旨赴都堂呈驗自後造大木樣至十二月工畢又奏乞差承受內臣一貟赴局預先指説前件儀法準備內中進呈日有宣問十月入內內侍省差到供奉官黃卿從至閏十二月二日具劄子取稟安立去處得旨置於集英殿臣謹案厯代天文之器制範頗多法亦小異至於激水運機其用則一蓋天者運行不息水者注之不竭以不竭逐不息之運茍注挹均調則參校旋轉之勢無有差舛也故張衡渾天云置密室中以漏水轉之令司之者閉户唱之以告靈臺之觀天者璇璣所加某星始見某星已中某星今沒皆如符合唐開元中詔浮屠一行與率府兵曹梁令瓚及諸術士更造鑄銅渾儀為之圓天之象具列宿及周天度數注水激輪令其自轉一日一夜天轉一周又别置二輪絡在天外綴以日月令得運行每天西轉一匝日正東行一度月行十二度有奇凡二十九轉而日月會三百六十五轉而日行匝仍置木匱以為地平令儀半在地上又立二木偶人於地平之前置鐘鼓使木人自然撞擊以候辰刻命之曰水運渾天俯視圖既成置武成殿前以示百僚梁朝渾象以木為之其圓如丸遍體布二十八宿三家星謂巫咸石申甘德三家星圖以青黃赤三色别之黃赤道及天河等别為橫規環以繞其外上下半之以象地張思訓渾儀為樓數層髙丈餘中有輪軸關柱激水以運輪又有直神搖鈴扣鐘擊鼓每一晝夜周而復始又有十二神各直一時時至則自執牌循環而出報隨刻數以定晝夜之長短至冬水凝運行遲澀則以水銀代之故無差舛又有日月星象皆取仰觀案舊法日月行度皆人所運新制成於自然尤為精妙然則據上所述張衡所謂靈臺之璇璣者兼渾儀候儀之法也置密室中者渾象也故葛洪云張平子陸公紀之徒張衡字平子陸績字公紀咸以為推步七曜之運以度厯象昏明之證候校以三八之氣考以刻漏之分占晷景之往來求形驗於事情莫密於渾象也開元水運俯視圖亦渾象也思訓凖開元之法而上以蓋為紫宫旁為周天度而正東西轉出其新意也今則兼採諸家之説備存儀象之器共置一臺中臺有二隔渾儀置於上渾象置於下樞機輪軸隱於中鐘鼓時刻司辰運於輪上木閣五層蔽於前司辰擊鼓搖鈴執牌出沒于閣內以水激輪輪轉而儀象皆動此兼用諸家之法也渾儀則上候三辰之行度增黃道為單環環中日見半體使望筒嘗指日日體嘗在筒竅中天西行一周日東移一度此出新意也渾象則列紫宫於北頂布中外官星二十八舍周天度黃赤道天河遍於天體此用王蕃及隋志所説也又以五色珠為日月五星貫以絲繩兩末以鈎環挂于南北軸依七曜盈縮遲疾留逆移徙令常在見行躔次之內晝夜隨天而旋使人於其旁驗星在之次與臺上測驗相應以不差為凖此用一行思訓所説而增損之也二器皆出一機以水激之不由人力校之前古疏密雖未易知而器度算數亦倣佛其遺象也又制刻漏四副一曰浮箭漏二曰稗漏皆與今太史及朝堂所用略同三曰沈箭漏四曰不息漏并採用術人所製法式置於别室使挈壺專掌逐時刻與儀象互相參考以合天星行度為正所以驗器數與天運不差則寒暑氣候自正也虞書稱在璇璣玉衡以齊七政蓋觀四七之中星以知節候之早晚考靈耀曰觀玉儀之遊昏明主時乃命中星者也璇璣中而星未中為急急則日過其度月不及其宿璇璣未中而星中為舒舒則日不及其度月過其宿璇璣中而星中為調調則風雨時庶草蕃廡而五穀登萬事康由是言之觀璇璣者不獨視天時而布政令抑欲察災祥而省得失也易曰先天而天不違後天而奉天時此之謂也今依月令創為四時中星圖以曉昏之度附于卷後將以上備聖主南面之省觀此儀象之大用也又上論渾天儀銅候儀渾天象三器不同古人之説亦有所未盡陳苖謂張衡所造蓋亦止在渾象七曜而何承天莫辨儀象之異若但以一名命之則不能盡其妙用也今新製備二器而通三用當總謂之渾天恭俟聖鑒以正其名也光祿大夫守吏部尚書兼侍讀上護軍武功郡開國侯臣蘇頌上右渾儀其制為輪三重一曰六合儀縱置於地渾中即天經也與地渾相結其體不動二曰三辰儀置六合儀內三曰四遊儀置三辰儀內曰六合者象上下四方天地之體也曰天經者對地渾也又名陽經環者以地渾為陰緯環對名也又植四龍柱於渾下之四維各繞以龍故名曰龍柱又置鰲雲於六合儀下承以雲氣雲下有鰲座名曰鰲雲又四龍柱下設十字水趺鑿溝通水道以平髙下故名曰水趺别設天常單環於六合儀內又設黃道雙環赤道單環皆在三辰儀內東西相交隨天運轉以驗列舍之行又為四象環附三辰儀相結於天運環黃赤道兩交又為直距二縱置於四遊儀內北屬六合儀地渾之上以正北極出地之度南屬六合儀地渾之下以正南極入地之度此渾儀大形也直距內夾置望筒一筒之半設關軸附直距上使運轉低昂窺測四方之星度李淳風制六合儀三辰儀四遊儀凡三重六合儀有金渾緯規其法劉曜時孔挺所增四遊儀即舜璿璣玉衡之遺法也本朝至道中韓顯符止用淳風六合四遊儀移三辰儀黃赤道安於六合儀如孔挺之説逮皇祐中復徙黃赤道附於三辰儀今則全用淳風三重之制而於三辰儀上設天運環以水運之水運之法始於漢張衡成於唐梁今瓚及僧一行復于本朝張思訓今又變正其制設天運環下以天柱關輪之類上動渾儀此出新製也右六合儀其制有天經有地渾有天常環天經即雙規也古制止言外雙規李淳風始有六合之名梁令瓚名陽經雙規韓顯符名天經雙規元豐復曰陽經雙規地渾之制梁名單橫規李淳風名金渾緯規梁令瓚名陰緯單環又謂之陰渾韓顯符名地盤平凖皇祐周琮及元豐所制與今儀復曰陰緯單環天經則縱置地渾則橫置天經環兩面各布列周天度數半在地渾之上半在地渾之下地渾環面已上為天其下為地其南北與天經環相屬持之地渾面鑿渠為平水溝以正天地之髙下於環內布列八干四維十二辰位以象地天常環於天經地渾內銜置之環側布列十有二時與時初正之分刻以成百刻之數右三辰儀其制為雙環在陽經環內兩環面各布周天度數環內附帶黃道赤道今又新置四象環附於三辰儀相結於天運環黃赤道兩交及天運環近南極下與鰲雲內牙軸相銜若鰲雲中天柱動則天運環動以轉三辰儀輪古無此儀李淳風造黃道儀始置之僧一行梁令瓚因之周琮造渾儀與元豐儀及今儀皆循用之右四遊儀舜典曰璿璣或曰璇璣梁曰雙環規李淳風曰四遊儀梁令瓚曰璇樞雙環韓顯符曰遊規周琮及元豐所制并今儀復曰四遊儀其儀為雙環在三辰儀內南北各有杠夾於雙環各有軸竅以運杠環兩面各布周天度數直距在雙環內連環體屬於六合儀南北極之杠軸內直北上屬北極直南下屬南極置望筒於直距內其半以關軸夾持之使得運轉凡遊儀東西運轉則望筒南北低昂故遊儀運動無所不至而望筒隨遊儀所至又置半筒以備測天運環相對之星以窺知天象右天經雙環兩環各直徑七尺七寸七分闊五寸厚八分與地渾單環相結於子午午正環兩面各列周天三百六十五度有畸其環半出地上半入地下於地渾面自北扶天而上三十有五度少弱則北極出地之度也於地渾面自南屬地而下三十有五度少弱則南極入地之度也環內當南北極為樞孔夾置杠軸軸末出環外各為臍二層以安三辰四遊之杠內各為孔與直距內望筒之孔相通其北則北極出地之度自此而止也其南則南極入地之度自此而止也北極出地三十有五度少弱四回而運之凡七十度半弱其度常見於地上則為紫微垣其星凡三十有七其數一百八十有三於四時常見不隱謂之上規南極入地三十五度少弱四回而運之凡七十度半弱其度常隱於地下其下星常隱而不見謂之下規上下規間一百一十有二度則黃道赤道內外宫也其星凡二百四十有六其數一千二百八十一則近日而隱逺日而見謂之中規右陰緯單環其直徑與闊如陽經環之度其厚二寸半其環與陽經南北子午相銜陽經當陰緯環上下之半故陰緯環面上為天下為地其上下各一百八十二度有畸環面鑿為平水溝通流以為凖其環內向布列八卦維辰之位具如前説右天常單環其直徑六尺七寸七分闊九分厚五分其環入陽經陰緯環裏古人以鳥殼之裹黃况之內與三辰儀重置居赤道之表環面列有十二時晝夜百刻以揆時刻之度具如前説古無此環周琮等造三重儀始置之元豐儀因之今新儀循用右三辰儀雙環其直徑六尺四寸八分闊一寸八分厚七分兩面各列周天三百六十五度有畸內帶黃赤道下帶天運環在六合儀內轉動不息右赤道單環其直徑六尺三寸闊九分厚六分其環結於三辰儀內橫絡天腹謂之中極以格黃道外則正與六合儀天常環相對環北面分列二十八舍周天之度內列二十有四氣六十有四卦環外列七十有二候其四正日躔之宿舊據厯法推步今以新儀考測知日躔與今天道差違凡三度蓋元豐甲子嵗冬之日至在赤道斗三度夏之日至在井九度少弱春分日在奎初度強秋分日在軫七度太弱定為四正之宿占測七政以叶天度右黃道雙環今所創也其直徑闊厚如赤道之數環面列周天之度與赤道同其環結於三辰儀與六合儀相疊以定南北極則黃道正在三辰儀南北其東西與赤道相結黃道出赤道外二十四度弱去極一百一十五度少弱為冬至黃道入赤道內二十四度弱去極六十七度半弱為夏至其東西與赤道相交去極各九十一度少弱為春秋二分冬夏二至春秋二分謂之四正太陰五星出入皆循其道各有度數古制雖有赤道後漢和帝時知赤道與天度頗有進退詔賈逵始置雙道李淳風一行梁令瓚韓顯符周琮熙寧元豐儀又因之今新儀循用不改唯顯符徙黃道附於六合儀黃道舊單環外於北際見太陽體不全見以測半日為法今以望筒於黃道雙環中全見日體若仰窺太陽隨天運轉則太陽適周於雙環之內右四象單環今之所創也附于三辰儀南北極末與南天運環黃赤道東西交相結今兩交無低墊之患隨天運環運轉與天符合右天運單環亦今所創也附於三辰儀居黃道之南環外周設四百七十八牙距下與鰲雲中天轂相銜其最下動樞輪軸一牙上動天柱一牙距乃上轉天運環一距天運環轉則三辰儀與環俱動以象天運無窮舊三辰儀未有水運故無此環今創為之其四百七十八牙距即倣用周天度分之法一本云其直徑四尺一寸四分半闊一寸九分厚七分附於三辰儀居黃道之南環外周設六百牙距云云其六百牙距即倣用元豐新浮漏六百分之法右四遊儀雙環直徑六尺闊一寸七分兩旁外脣厚六分半內脣半隱起二分共厚八分半即舜典所謂璇璣也環兩面布周天三百六十五度有畸其環外與六合三辰儀三重相疊其南北端兩極內置直距直距中夾橫簫使南北低昂六合儀不動以定天體三辰儀則隨天運環動轉以追天運若四遊儀則有時轉動亦追天運以橫簫窺測無所不至右直距二望筒一直距各長五尺六寸六分闊一寸六分厚八分安四遊儀中上屬北極下屬南極中施關軸以夾望筒望筒即舜典所謂玉衡也亦謂之橫簫李淳風曰玉衡梁令瓚曰玉衡望筒韓顯符曰窺管周琮及元豐所制并今新儀復曰望筒中空長五尺七寸四分方一寸六分其兩首各為方掩方一寸七分方掩中各為圜孔孔徑七分半望其上孔適周日體于直距中南北低昂旋運持正窺測七曜與列宿距度之逺近右四龍柱各髙七尺七寸每柱植於十字水趺之末上屬陰緯環之四維而上下各以一龍繞之案舊法其勢端直映蔽四維今因元豐製作為曲抱之勢使人立其下便於窺測右鰲雲其髙四尺下植於水趺十字之心飾以雲氣上承六合儀令無墊墜承以鰲坐故曰鰲雲皆中空內隱天柱上屬天運環古制無鰲雲後魏永興中詔造候部鐵儀於水平上以龜負雙規韓顯符不用元豐儀周日嚴等設鰲雲於水趺之上今新儀因之其內隱天柱上屬天運環乃新製也右十字水趺後魏曰十字水中植立四龍柱李淳風曰凖基末植鰲足以張四表梁令瓚曰水平槽韓顯符復曰十字水平元豐所制并今新儀復曰水趺其制各長一丈四寸髙七寸五分闊八寸四分十字置之中鑿水道深一寸五分相通以行水視水平則髙下正矣四末為水斗外各方一尺二寸髙下與水趺等鑿方孔以受四龍柱於水斗中其十字之會開天門方二寸自下樞軸運天柱由鰲雲中上屬六合儀雙環水趺舊無天門今創為之以度天柱上撥天運環動三辰儀新儀象法要卷上
