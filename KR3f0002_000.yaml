front:
  text: 御題新儀象法要梁代渾儀巳制之失傳蘇頌乃重為有經有緯述前驗具說具圖期後垂亦曰用心究鈎股即看影槧悉毫釐大成圓象精錙黍皇祖鴻貽萬世規
  hash: sha256:2c8d8a9d2242f7ccbb15ed761be4aa4f260378a15229b424dfd73108fdb8382f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0002_WYG_000-1a, image: WYG0786/WYG0786-0079a.png}
body:
  text: 乾隆乙未孟春上浣欽定四庫全書子部六新儀象法要天文算法類一推步之屬提要臣等謹案新儀象法要三卷宋蘇頌撰頌字子容南安人徙居丹徒慶厯二年進士官至右僕射兼中書門下侍郎纍爵趙郡公事蹟具宋史本傳是書為重修渾儀而作事在元祐間而尤袤遂初堂書目稱為紹聖儀象法要宋藝文志有儀象法要一卷亦注云紹聖中編蓋其書成於紹聖初也案本傳稱時别製渾儀命頌提舉頌既邃於律算以吏部令史韓公亷有巧思奏用之授以古法為臺三層上設渾儀中設渾象下設司辰貫以一機激水轉輪不假人力時至刻臨則司辰出告星辰躔度所次占候測驗不差晷刻晝夜晦明皆可推見前此未有也葉夢得石林燕語亦謂頌所修制之精逺出前古其學略授冬官正袁惟幾今其法蘇氏子孫亦不傳云云案書中有官局生袁惟幾之名與燕語所記相合其說可信知宋時故甚重之矣書首列進狀一首上卷自渾儀至水趺共十七圖中卷自渾象至冬至曉中星圖共十八圖下卷自儀象臺至渾儀圭表共二十五圖圖後各有說蓋當時奉敕撰進者其列璣衡制度候視法式甚為詳悉南宋以後流傳甚稀此本為明錢曽所藏後有乾道壬辰九月九日吳興施元之刻本於三衢坐嘯齊字兩行蓋從宋槧影摹者元之字德初官至司諫嘗注蘇詩行世此書卷末天運輪等四圖及各條所附一本云云皆元之据别本補入校核殊精而曾所抄尤極工緻其撰讀書敏求記載入是書自稱圖樣界晝不爽毫髮凡數月而後成楮墨精妙絶倫不數宋本良非誇語也我朝儀器精密敻絶千古頌所創造固無足輕重而一時講求制作之意頗有足備參考者且流傳祕冊閲數百年而摹繪如新是固宜為寶貴矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
